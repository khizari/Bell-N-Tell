<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Bell N Tell</title>
<link rel="icon" href="assets/logo.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="brand"><img src="assets/logo.png" alt="Bell N Tell logo">Bell N Tell</a>
    <button class="nav-toggle" onclick="toggleNav()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="deals.html">Deals</a></li>
      <li><a href="orders.html">My Orders</a></li>
    </ul>
    <div class="nav-actions">
      <a href="cart.html" class="icon-link cart-icon" title="Cart">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
        <span class="badge cart-badge" style="display:none;">0</span>
      </a>
      <a href="profile.html" class="icon-link profile-icon" title="Profile">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>
      </a>
    </div>
  </div>
</nav>

<header class="page-header" style="padding-bottom:96px;">
  <div class="deco" style="width:200px;height:200px; right:-50px; top:-70px;"></div>
  <div class="deco" style="width:120px;height:120px; left:30px; bottom:-60px;"></div>
  <div class="wrap"><h1 class="display">Login</h1><p>Sign in to track your orders and complete checkout.</p></div>
</header>

<div class="wrap">
  <div class="auth-card">
    <img class="mark" src="assets/bell-mark.svg" alt="">
    <h1 class="display">Welcome</h1>
    <p class="sub">Enter your name to continue — we'll use it to confirm your order on WhatsApp.</p>
    <div style="display:flex;flex-direction:column;gap:6px;text-align:left;margin-top:18px;">
      <label style="font-size:13px;font-weight:700;color:var(--ink);">Full Name</label>
      <input type="text" id="loginNameInput" placeholder="e.g. Ahmed Ali" style="border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;font-size:14px;font-family:'Manrope',sans-serif;outline:none;transition:border-color .2s;" onfocus="this.style.borderColor='var(--orange)'" onblur="this.style.borderColor='var(--line)'">
    </div>
    <button class="btn btn-primary btn-block" style="margin-top:16px;" onclick="submitLogin()">Continue</button>
  </div>
</div>

<div style="height:70px;"></div>

<script src="app.js"></script>
<script>
function submitLogin(){
  const input = document.getElementById('loginNameInput');
  const name = input.value.trim();
  if(!name){ input.style.borderColor='var(--red)'; input.focus(); return; }
  setUser({name});
  showToast('Welcome, '+name+'!');
  setTimeout(afterAuthRedirect, 400);
}
function afterAuthRedirect(){
  const redirect = DB.get('redirect', null);
  DB.set('redirect', null);
  if(redirect){ location.href = redirect; return; }
  if(!getDelivery()){ location.href = 'location.html'; return; }
  location.href = 'menu.html';
}
// Allow Enter key to submit
document.getElementById('loginNameInput').addEventListener('keydown', function(e){
  if(e.key === 'Enter') submitLogin();
});
</script>
</body>
</html>
