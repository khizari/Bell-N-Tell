  <ellipse cx="200" cy="330" rx="58" ry="30" fill="none" stroke="#C98F52" stroke-width="3"/>
  <path d="M170 320 q10 12 20 0 M195 314 q10 14 22 -2 M222 322 q8 10 16 0" stroke="#B8784A" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- salad bowl -->
