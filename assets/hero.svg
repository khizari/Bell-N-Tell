<svg viewBox="0 0 560 480" xmlns="http://www.w3.org/2000/svg">
  <circle cx="290" cy="240" r="220" fill="#EFE7D8"/>
  <circle cx="290" cy="240" r="220" fill="url(#g1)" opacity=".5"/>
  <defs>
    <radialGradient id="g1" cx="35%" cy="25%" r="70%">
      <stop offset="0%" stop-color="#FFF6EC"/>
      <stop offset="100%" stop-color="#EFE7D8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- big plate -->
