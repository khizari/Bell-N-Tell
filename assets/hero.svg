  <path d="M345 312 q20 -20 45 -12 q25 -10 45 12z" fill="#3FA66B"/>
  <circle cx="365" cy="306" r="8" fill="#E0392B"/>
  <circle cx="395" cy="298" r="7" fill="#F4C53A"/>
  <circle cx="420" cy="306" r="7" fill="#F4A23A"/>

