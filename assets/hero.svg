  <ellipse cx="290" cy="196" rx="38" ry="17" fill="#E8702C"/>
  <circle cx="278" cy="192" r="5" fill="#F4C53A"/>
  <circle cx="302" cy="198" r="5" fill="#3FA66B"/>

