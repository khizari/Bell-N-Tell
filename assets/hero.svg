    <circle cx="20" cy="5" r="17" fill="#7a3b1e"/>
    <circle cx="58" cy="5" r="18" fill="#c0392b"/>
    <circle cx="98" cy="5" r="16" fill="#3FA66B"/>
    <circle cx="136" cy="5" r="18" fill="#7a3b1e"/>
